<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Vacation #1</button>
    <button id="mem2-button">Vacation #2</button>
    <button id="mem3-button">Vacation #3</button>
    <h1>My Top 3 Favorite<span> Summer Trips</span></h1>
    <ol>
      <li>
        <h3 id="mem1">Vacation #1</h3>
        <p id="meminfo1">More about this memory.</p>
        <div>
        <img
          src= "47.JPEG"
          alt= "photo of family"
          width="300"
          class="vaca1img">

        <img
          src= "IMG_7293.png"
          alt= "photo of tree"
          width="100"
          class="vaca1img2">

        <img
          src= "Screenshot 2026-04-14 at 10.27.54 AM.png"
          alt= "photo of kayak"
          width="200"
          class="vaca1img3">
          </div>
        
      </li>

      <li>
        <h3 id="mem2">Vacation #2</h3>
        <p id="meminfo2">More about this memory.</p>
        <div>
        <img
          src= "IMG_9621.png"
          alt= "photo of bridge"
          width="200"
          class="vaca2img">

        <img
          src= "IMG_2953.png"
          alt= "photo of tower"
          width="200"
          class="vaca2img2">

        <img
          src= "IMG_7072.png"
          alt= "photo of friend"
          width="230"
          class="vaca2img3">
          </div>
      </li>

      <li>
        <h3 id="mem3">Vacation #3</h3>
        <p id="meminfo3">More about this memory</p>
        <div>
        <img
          src= "IMG_0769.jpeg"
          alt= "photo of friends"
          width="200"
          class="vaca3img">

        <img
          src= "IMG_0025.jpeg"
          alt= "photo of me"
          width="200"
          class="vaca3img2">

        <img
          src= "IMG_1904.jpeg"
          alt= "photo of spain"
          width="200"
          class="vaca3img3">
          </div>
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $(".vaca1img").hide()
      $(".vaca1img2").hide()
      $(".vaca1img3").hide()
      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "blue");
        $("#mem1").text("Blue Mountain Resort, Ontario Canada(2014)⛰️☀️");
        $("#meminfo1").text("I went to Blue mountain resort in the summer of 2014. It was the first ever real vacation I ever took, so I remember being super excited to go. They had super fun activities like water parks, mini golf, hiking, and a little village with shops and restaurants. I had so much fun on this trip!");
        $("html").css("background-color", "yellow")
        $(".vaca1img").show(2000)
        $(".vaca1img2").show(3000)
        $(".vaca1img3").show(4000)
      });

       $(".vaca2img").hide()
       $(".vaca2img2").hide()
       $(".vaca2img3").hide()
      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "orange");
        $("#mem2").text("London & Paris(2018) 💂🏻‍♂️☕️🥐");
        $("#meminfo2").text("This was the first ever trip that I took to Europe. The plane ride was long but the views were so worth it. In London I got to see Buckingham Palace, Big Ben(although it was under construction) and went to the Harry Potter Museum. After a short train ride to Paris, I met up with one of my best frineds and we went around the city together. We walked the streets of Le Marais, toured the Seine and the Eiffel Tower, and so many other amazing activities. This will always be one of my most memorable trips.");
        $("html").css("background-color", "red")
        $(".vaca2img").show(2000)
        $(".vaca2img2").show(3000)
        $(".vaca2img3").show(4000)
      });

       $(".vaca3img").hide()
       $(".vaca3img2").hide()
       $(".vaca3img3").hide()
      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "purple");
        $("#mem3").text("London & Spain(2024) ☎️🌊🥘");
        $("#meminfo3").text("I took this vacation the summer after my sophmore year. I was able to meet up with my cousin and my aunt in London before we attended the Eras Tour at Wembley Stadium. We went around the city, ate at some delicios restaurants, and went on the London Eye. In Spain my family went to Valencia, where I was able to see one of my friends and her father who had moved there. My cousin, aunts, uncles, and one of my best friends were able to join us as well. We toured around the city, shopped, and celebrated my mothers 50th birthday! After, me and my parents spent a few days in Madrid. The food was amazing and the sights were beautiful. This was definitely one of my most fun vacations.");
        $("html").css("background-color", "pink")
        $(".vaca3img").show(2000)
        $(".vaca3img2").show(3000)
        $(".vaca3img3").show(4000)
      });


    </script>
  </body>
</html>
